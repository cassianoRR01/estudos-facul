<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Avaliação formadora III</title>
</head>
<body>
    <main>
        <div id="esquerda">
            <section id="formulario">
                <form>
                    <h1>Adicione uma tarefa</h1>
                    
                    <input type="text" id="addTarefa" placeholder="ex: Tirar o lixo">
                    
                    <button id="botao">Adicionar tarefa</button>
                </form>
            </section>
            
            <div id="barraProg">
                <div id="circuloProg" class="circulo">
                    <div id="textoProg">0%</div>
                </div>
            </div>
        </div>

        <div id="direita">

            <h2>Suas tarefas</h2>

            <section id="tarefa">
                <!--Tarefas irão entrar aqui-->
            </section>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>

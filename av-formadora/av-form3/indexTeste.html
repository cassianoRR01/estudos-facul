<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de tarefas</title>
  <link rel="stylesheet" href="styleTeste.css">
</head>

<body>

<div class="container">

  <!-- ESQUERDA -->
  <div class="leftPanel">

    <h1>Lista de tarefas</h1>

    <input
      id="taskInput"
      type="text"
      placeholder="Digite sua tarefa..."
    >

    <button id="addButton">
      Adicionar tarefa
    </button>

    <div class="progressBox">

      <div id="progressCircle" class="circle">
        <span id="progressText">0%</span>
      </div>

    </div>

  </div>

  <!-- DIREITA -->
  <div class="rightPanel">

    <h2>Suas tarefas</h2>

    <div id="taskList"></div>

  </div>

</div>

<script src="scriptTeste.js"></script>

</body>
</html>

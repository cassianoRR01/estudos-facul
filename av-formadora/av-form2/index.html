<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Av-Formadora 2</title>
</head>
<body>
    <form method="post">
        <input type="text" id="nome" placeholder="Inserir nome" required>

        <input type="text" id="sobrenome" placeholder="Inserir sobrenome">

        <input type="email" placeholder="Inserir e-mail">

        <input type="date">

        <optgroup>
            <option value="masc">masculino</option>
            <option value="fem">feminino</option>
            <option value="outro">outros</option>
        </optgroup>

        <input type="password" placeholder="Inserir senha">

        <input type="password" placeholder="Confirmar senha">

        <button type="submit">Enviar</button>

    </form>
    
</body>
</html>

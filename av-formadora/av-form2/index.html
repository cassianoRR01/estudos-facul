<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css" media="all">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />
    <title>Av-Formadora 2</title>
</head>
<body>

    <main>
        <div>
            <p><span class="material-symbols-outlined">person</span></p>
            <h2>Bem vindo!</h2>
            <p>Preencha o formulário para se cadastrar</p>
        </div>

        <form method="post">
            <h2>Cadastre-se</h2>

            <input type="text" id="nome" placeholder="Insira seu nome" required>
            
            <input type="text" id="sobrenome" placeholder="Insira seu sobrenome" required>
            
            <input type="email" id="email" placeholder="Insira seu e-mail" required>
            
            <input type="date" id="data" placeholder="Data de nascimento" required>
            
            <select id="genero" required>
                <option value="" selected>selecione seu gênero</option>
                <option value="masc">masculino</option>
                <option value="fem">feminino</option>
                <option value="outro">outro</option>
            </select>
            
            <input type="password" id="senha" placeholder="Crie uma senha" minlength="6" required>
            
            <input type="password" id="confirmSenha" placeholder="Confirme sua senha" required>
            
            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>Feito por <a href="https://github.com/cassianoRR01" target="_blank">Cassiano de Medeiros</a></p>
    </footer>
    
</body>
</html>
